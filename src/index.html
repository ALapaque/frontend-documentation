<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Practical Docs — Three frameworks. One discipline.</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Documentation pédagogique Angular, React et Vue — trois niveaux, du Junior au Senior."
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <!-- Pre-paint theme: read the stored mode before the first render so the
         page doesn't flash from default → user choice. ThemeService owns it
         afterwards. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('pd:theme');
          if (m === 'light' || m === 'dark') {
            document.documentElement.setAttribute('data-theme', m);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
